<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Notes - Team7 System Solution</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .module-section { display: none; }
        .active-section { display: block; }
        .product-row { display: grid; grid-template-columns: 3fr 1fr auto; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <header class="app-header">
        <a href="dashboard.html" class="btn-icon"><i class="fas fa-arrow-left"></i></a>
        <h1 id="pageTitle">Delivery Notes</h1>
        <button class="btn-icon" id="btnToggleView"><i class="fas fa-plus" id="toggleIcon"></i></button>
    </header>

    <!-- LIST SECTION -->
    <div id="listSection" class="module-section active-section">
        <div class="search-container">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by DelNo# or Customer...">
            </div>
        </div>
        <div class="container" id="dnList">
            <div class="text-center text-muted mt-4 p-4">Loading delivery notes...</div>
        </div>
        <button class="fab" id="fabAdd" title="Create Delivery Note">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <!-- MAKE SECTION -->
    <div id="makeSection" class="module-section container mt-3">
        <form id="dnForm" class="card">
            <div class="form-group" style="display:flex; justify-content:space-between;">
                <div>
                    <label>Delivery No *</label>
                    <input type="text" id="dNumber" class="form-control" readonly>
                </div>
                <div>
                    <label>Delivery Date *</label>
                    <input type="date" id="dDate" class="form-control" required>
                </div>
            </div>

            <hr class="mb-3 mt-3">

            <div class="form-group">
                <label>Select Customer *</label>
                <select id="customerSelect" class="form-control" required>
                    <option value="">-- Choose Customer --</option>
                </select>
            </div>

            <hr class="mb-3 mt-3">

            <div class="d-flex justify-content-between mb-2">
                <h4>Items to Deliver</h4>
                <button type="button" class="btn btn-sm btn-outline" id="btnAddItemRow"><i class="fas fa-plus"></i> Add item</button>
            </div>

            <div id="itemsContainer" class="mb-4"></div>

            <button type="submit" class="btn btn-primary w-100 mt-3 p-3">Save Delivery Note</button>
        </form>
    </div>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/delivery_note.js"></script>
</body>
</html>
