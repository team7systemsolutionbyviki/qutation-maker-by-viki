<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipts - Team7 System Solution</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>.module-section { display: none; } .active-section { display: block; }</style>
</head>
<body>
    <header class="app-header">
        <a href="dashboard.html" class="btn-icon"><i class="fas fa-arrow-left"></i></a>
        <h1 id="pageTitle">Receipts</h1>
        <button class="btn-icon" id="btnToggleView"><i class="fas fa-plus" id="toggleIcon"></i></button>
    </header>

    <div id="listSection" class="module-section active-section">
        <div class="search-container">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by Name, Company OR Receipt#">
            </div>
        </div>
        <div class="container" id="receiptList">
            <div class="text-center text-muted mt-4 p-4">Loading receipts...</div>
        </div>
        <button class="fab" id="fabAdd" title="Create Receipt">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <div id="makeSection" class="module-section container mt-3">
        <form id="receiptForm" class="card">
            <div class="form-group">
                <label>Receipt Date *</label>
                <input type="date" id="rDate" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Select Customer *</label>
                <select id="customerSelect" class="form-control" required>
                    <option value="">-- Choose Customer --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Invoice Number Reference</label>
                <input type="text" id="invoiceRef" class="form-control" placeholder="e.g. INV2401-0001">
            </div>
            <div class="form-group">
                <label>Payment Method *</label>
                <select id="paymentMethod" class="form-control" required>
                    <option value="Cash">Cash</option>
                    <option value="Bank Transfer">Bank Transfer / NEFT / IMPS</option>
                    <option value="UPI">UPI / GPay / PhonePe</option>
                    <option value="Cheque">Cheque</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount Received (₹) *</label>
                <input type="number" step="0.01" id="amount" class="form-control" required>
            </div>

            <!-- Cash Calculator (Family & Friends) -->
            <div class="card mt-4" style="border: 2px dashed #e91e63; background: rgba(233, 30, 99, 0.05); padding: 15px;">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:15px;">
                    <h4 style="margin:0; color:#e91e63;"><i class="fas fa-calculator mr-2"></i> Cash Calculator</h4>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <input type="checkbox" id="chkFamilyFriends" style="transform: scale(1.2);" onchange="updateFamilyFriendsMode()">
                        <label for="chkFamilyFriends" class="mb-0 text-muted small" style="cursor:pointer;">Family & Friends</label>
                    </div>
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div class="form-group mb-0">
                        <label class="small font-weight-bold">Amount Given (₹)</label>
                        <input type="number" id="calcAmountGiven" class="form-control" placeholder="Cash Received" oninput="calculateReturn()">
                    </div>
                    <div class="form-group mb-0">
                        <label class="small font-weight-bold">Balance to Return</label>
                        <div id="lblReturnAmount" style="font-size: 1.5rem; font-weight: bold; color: var(--danger-color); padding: 5px 0;">₹0.00</div>
                    </div>
                </div>
                
                <div id="familyFriendsNote" class="mt-2 text-danger small" style="display:none; font-style: italic;">
                    <i class="fas fa-heart mr-1"></i> Special transaction for family/friends.
                </div>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea id="notes" class="form-control" rows="2"></textarea>
            </div>
            <button type="submit" class="btn btn-danger w-100 mt-3 p-3 text-white font-weight-bold" style="background-color: var(--secondary-color);">Save Receipt</button>
        </form>
    </div>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/receipt.js"></script>
</body>
</html>
