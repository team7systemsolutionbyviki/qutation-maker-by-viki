<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Customers - Team7 System Solution</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <header class="app-header">
        <a href="dashboard.html" class="btn-icon"><i class="fas fa-arrow-left"></i></a>
        <h1>Customers</h1>
        <button class="btn-icon" id="btnSync"><i class="fas fa-sync"></i></button>
    </header>

    <div class="search-container">
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="btn btn-sm" id="btnExportExcel" style="background:#28a745; color:#fff;"><i class="fas fa-file-excel"></i> Export</button>
            <button class="btn btn-sm" id="btnImportExcel" style="background:#17a2b8; color:#fff;" onclick="document.getElementById('importExcelInput').click()"><i class="fas fa-file-import"></i> Import</button>
            <input type="file" id="importExcelInput" accept=".xlsx, .xls" style="display:none;">
        </div>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by Name, Company or Phone...">
        </div>
    </div>

    <div class="container" id="customerList">
        <!-- Customer list placeholder -->
        <div class="text-center text-muted mt-4 p-4">Loading customers...</div>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" id="fabAddCustomer" title="Add Customer">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Modal for Add/Edit Customer -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Customer Area</h3>
                <span class="modal-close" id="closeCustomerModal">&times;</span>
            </div>
            <form id="customerForm">
                <input type="hidden" id="customerId">
                <div class="form-group">
                    <label>Customer Name *</label>
                    <input type="text" id="customerName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="companyName" class="form-control">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="customerPhone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="customerEmail" class="form-control">
                </div>
                <div class="form-group">
                    <label>Billing Address</label>
                    <textarea id="customerAddress" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>GST Number</label>
                    <input type="text" id="customerGST" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3" id="btnSaveCustomer">Save Customer</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/customer.js"></script>
</body>
</html>
