<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Orders - Team7 System Solution</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>.module-section { display: none; } .active-section { display: block; } .product-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; } @media (max-width: 768px) { .product-row { grid-template-columns: 1fr; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; } }</style>
</head>
<body>
    <header class="app-header">
        <a href="dashboard.html" class="btn-icon"><i class="fas fa-arrow-left"></i></a>
        <h1 id="pageTitle">Purchase Orders</h1>
        <button class="btn-icon" id="btnToggleView"><i class="fas fa-plus" id="toggleIcon"></i></button>
    </header>
    <div id="listSection" class="module-section active-section">
        <div class="search-container"><div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search by PO# or Supplier..."></div></div>
        <div class="container" id="poList"><div class="text-center text-muted mt-4 p-4">Loading POs...</div></div>
        <button class="fab" id="fabAdd" title="Create PO"><i class="fas fa-plus"></i></button>
    </div>
    <div id="makeSection" class="module-section container mt-3">
        <form id="poForm" class="card">
            <div class="form-group" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>PO No *</label><input type="text" id="poNumber" class="form-control" readonly></div>
                <div><label>PO Date *</label><input type="date" id="poDate" class="form-control" required></div>
            </div>
            <div class="form-group">
                <label>Supplier Name *</label>
                <input type="text" id="supplierName" class="form-control" required placeholder="Enter supplier name">
            </div>
            <div class="d-flex justify-content-between mb-2 mt-4">
                <h4>Products</h4><button type="button" class="btn btn-sm btn-outline" id="btnAddItemRow"><i class="fas fa-plus"></i> Add item</button>
            </div>
            <div id="itemsContainer" class="mb-4"></div>
            <div class="bg-light p-3 mt-4" style="border-radius: var(--radius-md); text-align: right;">
                <h3 class="text-primary mt-2">Grand Total: <span id="lblGrandTotal">₹0.00</span></h3>
            </div>
            <button type="submit" class="btn btn-warning w-100 mt-3 p-3 font-weight-bold" style="font-weight:bold;">Save Purchase Order</button>
        </form>
    </div>
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module">
        import { auth, db, collection, addDoc, getDocs, doc, deleteDoc, query, where, orderBy } from './js/firebase.js';
        import { showToast, showLoader, hideLoader, formatCurrency, currentUser, generateId } from './js/app.js';
        let isMakeMode = false, pos = [];
        
        document.getElementById('btnToggleView').addEventListener('click', () => toggleMode());
        document.getElementById('fabAdd').addEventListener('click', () => toggleMode(true));
        
        function toggleMode(forceMake = null) {
            isMakeMode = forceMake !== null ? forceMake : !isMakeMode;
            if(isMakeMode) {
                document.getElementById('listSection').classList.remove('active-section');
                document.getElementById('makeSection').classList.add('active-section');
                document.getElementById('pageTitle').textContent = 'Make PO';
                document.getElementById('poNumber').value = generateId('PO-');
                document.getElementById('poDate').valueAsDate = new Date();
                if(document.getElementById('itemsContainer').children.length === 0) addItemRow();
            } else {
                document.getElementById('makeSection').classList.remove('active-section');
                document.getElementById('listSection').classList.add('active-section');
                document.getElementById('pageTitle').textContent = 'Purchase Orders';
            }
        }
        
        window.addItemRow = function() {
            const rowId = `row_${Date.now()}`;
            const div = document.createElement('div');
            div.className = 'product-row list-item';
            div.id = rowId;
            div.innerHTML = `
                <div><input type="text" class="form-control item-name" placeholder="Item Name" required></div>
                <div><input type="number" step="0.01" class="form-control item-price" placeholder="Price" oninput="calc()" required></div>
                <div><input type="number" step="1" value="1" class="form-control item-qty" oninput="calc()" required></div>
                <div><input type="number" class="form-control item-total" readonly placeholder="Total"></div>
                <div><button type="button" class="btn btn-sm btn-danger mt-md-4" onclick="document.getElementById('${rowId}').remove(); calc()"><i class="fas fa-times"></i></button></div>
            `;
            document.getElementById('itemsContainer').appendChild(div);
        }
        document.getElementById('btnAddItemRow').addEventListener('click', window.addItemRow);
        
        window.calc = function() {
            let grandTotal = 0;
            const rows = document.querySelectorAll('.product-row');
            rows.forEach(row => {
                const price = parseFloat(row.querySelector('.item-price').value) || 0;
                const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
                let total = price * qty;
                row.querySelector('.item-total').value = total.toFixed(2);
                grandTotal += total;
            });
            document.getElementById('lblGrandTotal').textContent = formatCurrency(grandTotal);
        }

        document.getElementById('poForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const items = [];
            let gt = 0;
            document.querySelectorAll('.product-row').forEach(r => {
                const poTotal = (parseFloat(r.querySelector('.item-price').value) || 0) * (parseFloat(r.querySelector('.item-qty').value) || 0);
                items.push({
                    name: r.querySelector('.item-name').value,
                    price: parseFloat(r.querySelector('.item-price').value),
                    qty: parseFloat(r.querySelector('.item-qty').value),
                    total: poTotal
                });
                gt += poTotal;
            });
            const data = {
                userId: currentUser.uid, poNo: document.getElementById('poNumber').value, date: document.getElementById('poDate').value,
                supplierName: document.getElementById('supplierName').value, items, total: gt, createdAt: new Date().toISOString()
            };
            showLoader();
            try { await addDoc(collection(db, "purchase_orders"), data); showToast("PO Created"); document.getElementById('poForm').reset(); document.getElementById('itemsContainer').innerHTML=''; toggleMode(false); loadPOs(); } 
            catch(err) { showToast("Error", true); } finally { hideLoader(); }
        });

        async function loadPOs() {
            if(!currentUser) return;
            const el = document.getElementById('poList');
            try {
                const q = query(collection(db, "purchase_orders"), where("userId", "==", currentUser.uid));
                const snap = await getDocs(q);
                pos = [];
                snap.forEach(d => pos.push({id: d.id, ...d.data()}));
                pos.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                render(pos);
            } catch (err) {
                console.error("Error loading POs:", err);
                el.innerHTML = '<div class="text-center text-danger p-4"><i class="fas fa-exclamation-triangle mb-2"></i><br>Failed to load Purchase Orders.</div>';
            }
        }
        function render(data) {
            const el = document.getElementById('poList'); el.innerHTML = '';
            if(!data.length) return el.innerHTML = '<div class="text-center text-muted p-4">No POs found.</div>';
            data.forEach(p => {
                const d = document.createElement('div'); d.className = 'list-item';
                d.innerHTML = `<div class="list-item-content"><h4 class="text-warning mb-1">${p.poNo}</h4><p>${p.supplierName}</p><p class="text-success font-weight-bold">${formatCurrency(p.total)}</p></div>`;
                el.appendChild(d);
            });
        }
        auth.onAuthStateChanged(u => { if(u){ loadPOs(); toggleMode(false); } });
    </script>
</body>
</html>
