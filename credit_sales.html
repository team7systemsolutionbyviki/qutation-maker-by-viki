<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Sales - Team7 System Solution</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .module-section { display: none; }
        .active-section { display: block; }
        .badge {
            padding: 3px 8px;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: bold;
        }
        .badge-danger { background-color: var(--danger-color); color: white; }
        .badge-warning { background-color: var(--warning-color); color: #000; }
    </style>
</head>
<body>
    <header class="app-header">
        <a href="dashboard.html" class="btn-icon"><i class="fas fa-arrow-left"></i></a>
        <h1 id="pageTitle">Credit Sales</h1>
        <button class="btn-icon" style="visibility:hidden"><i class="fas fa-plus"></i></button>
    </header>

    <div id="listSection" class="module-section active-section">
        <div class="search-container">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by Invoice# or Customer...">
            </div>
        </div>

        <div class="container" id="creditList">
            <div class="text-center text-muted mt-4 p-4">Loading credit sales...</div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Receive Payment</h3>
                <span class="modal-close" onclick="document.getElementById('paymentModal').style.display='none'">&times;</span>
            </div>
            <form id="paymentForm">
                <input type="hidden" id="payInvoiceId">
                <div class="form-group mb-2">
                    <p class="mb-1 text-muted">Invoice No: <strong class="text-dark" id="payInvNo"></strong></p>
                    <p class="mb-1 text-muted">Customer: <strong class="text-dark" id="payCustomer"></strong></p>
                    <p class="mb-1 text-muted">Total Due: <strong class="text-danger" id="payBalance"></strong></p>
                </div>
                <div class="form-group">
                    <label>Payment Amount</label>
                    <input type="number" id="payAmount" step="0.01" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3 p-3 font-weight-bold">Apply Payment</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module">
        import { auth, db, collection, getDocs, doc, getDoc, setDoc, query, where, orderBy } from './js/firebase.js';
        import { showLoader, hideLoader, formatCurrency, currentUser, showToast } from './js/app.js';
        
        let allCredits = [];

        async function loadCreditSales() {
            showLoader();
            try {
                const q = query(collection(db, "invoices"), where("userId", "==", currentUser.uid));
                const snap = await getDocs(q);
                allCredits = [];
                
                snap.forEach(d => {
                    const data = d.data();
                    const total = parseFloat(data.grandTotal || 0);
                    const paid = parseFloat(data.amountPaid || 0);
                    const bal = total - paid;
                    if(bal > 0) {
                        allCredits.push({ id: d.id, ...data, balance: bal, total: total, paid: paid });
                    }
                });
                allCredits.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                render(allCredits);
            } catch(e) {
                console.error("Error loading credit sales:", e);
                document.getElementById('creditList').innerHTML = '<div class="text-center text-danger p-4">Failed to load credit sales.</div>';
            } finally {
                hideLoader();
            }
        }

        function render(data) {
            const list = document.getElementById('creditList');
            list.innerHTML = '';
            
            if(data.length === 0) {
                list.innerHTML = '<div class="text-center text-muted p-4"><i class="fas fa-check-circle fa-3x text-success mb-3"></i><br>Great! You have no outstanding credit sales.</div>';
                return;
            }

            const totalOutstanding = data.reduce((sum, item) => sum + item.balance, 0);
            
            const headerDiv = document.createElement('div');
            headerDiv.className = 'card bg-light mb-3 p-3 text-center';
            headerDiv.innerHTML = `<h5 class="mb-1 text-muted">Total Outstanding</h5><h3 class="text-danger mb-0">${formatCurrency(totalOutstanding)}</h3>`;
            list.appendChild(headerDiv);

            data.forEach(inv => {
                const isPartial = inv.paid > 0;
                const statusBadge = isPartial ? '<span class="badge badge-warning" style="padding: 2px 6px; border-radius: 4px; font-size: 0.75rem;">Partial</span>' : '<span class="badge badge-danger" style="padding: 2px 6px; border-radius: 4px; font-size: 0.75rem;">Unpaid</span>';
                
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="list-item-content">
                        <h4 class="text-primary mb-1">${inv.invoiceNo} ${statusBadge}</h4>
                        <p class="font-weight-bold mb-1">${inv.customerName}</p>
                        <p class="mb-1 text-muted" style="font-size:0.8rem">Date: ${inv.date} | Total: ${formatCurrency(inv.total)} | Paid: ${formatCurrency(inv.paid)}</p>
                        <p><span class="text-danger" style="font-weight:600;font-size:1.1rem">Balance: ${formatCurrency(inv.balance)}</span></p>
                    </div>
                    <div class="list-item-actions ml-2" style="flex-direction:column; justify-content:center;">
                        <button class="btn btn-sm btn-outline text-success border-0 receive-btn" data-id="${inv.id}" title="Receive Payment">
                            <i class="fas fa-money-bill-wave fa-lg"></i>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
            
            document.querySelectorAll('.receive-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.getAttribute('data-id');
                    openPaymentModal(id);
                });
            });
        }

        function openPaymentModal(id) {
            const inv = allCredits.find(i => i.id === id);
            if(!inv) return;
            document.getElementById('payInvoiceId').value = id;
            document.getElementById('payInvNo').textContent = inv.invoiceNo;
            document.getElementById('payCustomer').textContent = inv.customerName;
            document.getElementById('payBalance').textContent = formatCurrency(inv.balance);
            document.getElementById('payAmount').value = inv.balance;
            document.getElementById('payAmount').max = inv.balance;
            
            document.getElementById('paymentModal').style.display = 'flex';
        }

        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('payInvoiceId').value;
            const payAmt = parseFloat(document.getElementById('payAmount').value);
            
            const inv = allCredits.find(i => i.id === id);
            if(!inv || isNaN(payAmt) || payAmt <= 0) return;
            
            const newPaid = inv.paid + payAmt;
            if(newPaid > inv.total) {
                showToast("Payment cannot exceed total balance!", true);
                return;
            }

            showLoader();
            try {
                const invRef = doc(db, "invoices", id);
                const invSnap = await getDoc(invRef);
                if(invSnap.exists()) {
                    const invData = invSnap.data();
                    invData.amountPaid = newPaid;
                    await setDoc(invRef, invData);
                    showToast("Payment recorded successfully!");
                    document.getElementById('paymentModal').style.display = 'none';
                    loadCreditSales(); // Reload the list
                }
            } catch(e) {
                console.error(e);
                showToast("Error recording payment", true);
            } finally {
                hideLoader();
            }
        });
        
        auth.onAuthStateChanged(user => {
            if(user) loadCreditSales();
        });
    </script>
</body>
</html>
