<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Team7 System Solution</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <header class="app-header">
        <a href="dashboard.html" class="btn-icon"><i class="fas fa-arrow-left"></i></a>
        <h1>Products</h1>
        <button class="btn-icon" id="btnSync"><i class="fas fa-sync"></i></button>
    </header>

    <div class="search-container">
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="btn btn-sm" id="btnExportExcel" style="background:#28a745; color:#fff;"><i class="fas fa-file-excel"></i> Export</button>
            <button class="btn btn-sm" id="btnImportExcel" style="background:#17a2b8; color:#fff;" onclick="document.getElementById('importExcelInput').click()"><i class="fas fa-file-import"></i> Import</button>
            <input type="file" id="importExcelInput" accept=".xlsx, .xls" style="display:none;">
        </div>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by Product Name or HSN...">
        </div>
    </div>

    <div class="container" id="productList">
        <!-- Product list placeholder -->
        <div class="text-center text-muted mt-4 p-4">Loading products...</div>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" id="fabAddProduct" title="Add Product">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Modal for Add/Edit Product -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Product Details</h3>
                <span class="modal-close" id="closeProductModal">&times;</span>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" id="productName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="productDesc" class="form-control" rows="2"></textarea>
                </div>
                <div class="form-group" style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label>HSN Code</label>
                        <input type="text" id="hsnCode" class="form-control">
                    </div>
                    <div style="flex:1;">
                        <label>Unit *</label>
                        <select id="productUnit" class="form-control" required>
                            <option value="pcs">Pieces (pcs)</option>
                            <option value="kg">Kilograms (kg)</option>
                            <option value="ltr">Liters (ltr)</option>
                            <option value="box">Box (box)</option>
                            <option value="mtr">Meters (mtr)</option>
                            <option value="nos">Numbers (nos)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label>Purchase Price (₹)</label>
                        <input type="number" step="0.01" id="purchasePrice" class="form-control">
                    </div>
                    <div style="flex:1;">
                        <label>Selling Price (₹) *</label>
                        <input type="number" step="0.01" id="sellingPrice" class="form-control" required>
                    </div>
                </div>
                <div class="form-group" style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label>Product Type *</label>
                        <select id="productType" class="form-control" required>
                            <option value="product">Product</option>
                            <option value="service" selected>Service</option>
                        </select>
                    </div>
                    <div style="flex:1;">
                        <label>Stock Quantity</label>
                        <input type="number" id="productStock" class="form-control" value="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Tax / GST Percentage (%)</label>
                    <select id="gstRate" class="form-control">
                        <option value="0">0%</option>
                        <option value="5">5%</option>
                        <option value="12">12%</option>
                        <option value="18">18%</option>
                        <option value="28">28%</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-warning w-100 mt-3 text-dark font-weight-bold" id="btnSaveProduct" style="font-weight: bold;">Save Product</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/product.js"></script>
</body>
</html>
